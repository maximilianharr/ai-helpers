name: Deploy

on:
  push:
    branches: [main]          # → production
    tags: ["v*.*.*"]          # → production (tagged release)
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

jobs:

  # ──────────────────────────────────
  # Gate: all CI checks must have passed
  # ──────────────────────────────────
  gate:
    name: Deployment Gate
    runs-on: ubuntu-latest
    steps:
      - name: Check required status checks
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha
            });
            const failed = checks.check_runs.filter(
              c => c.conclusion !== 'success' && c.conclusion !== 'skipped'
            );
            if (failed.length > 0) {
              core.setFailed(`Failing checks: ${failed.map(c => c.name).join(', ')}`);
            }

  # ──────────────────────────────────
  # Build & push container images
  # ──────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: gate
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Log in to container registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | \
            podman login ${{ vars.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build and push backend
        run: |
          podman build \
            --build-arg BUILD_SHA=${{ github.sha }} \
            -f backend/Containerfile \
            -t ${{ vars.REGISTRY_URL }}/app-backend:${{ steps.tag.outputs.tag }} \
            backend/
          podman push ${{ vars.REGISTRY_URL }}/app-backend:${{ steps.tag.outputs.tag }}

      - name: Build and push frontend
        run: |
          podman build \
            -f frontend/Containerfile \
            -t ${{ vars.REGISTRY_URL }}/app-frontend:${{ steps.tag.outputs.tag }} \
            frontend/
          podman push ${{ vars.REGISTRY_URL }}/app-frontend:${{ steps.tag.outputs.tag }}

  # ──────────────────────────────────
  # Deploy to staging
  # ──────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: deploy
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/app
            IMAGE_TAG=${{ needs.build-push.outputs.image_tag }} \
            podman compose pull && \
            podman compose up -d --remove-orphans

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            curl -sf ${{ vars.STAGING_URL }}/health && echo "Healthy!" && exit 0
            sleep 5
          done
          echo "Health check timed out" && exit 1

  # ──────────────────────────────────
  # AI smoke test on staging
  # ──────────────────────────────────
  ai-smoke-test:
    name: AI Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - name: Run AI-generated smoke tests
        run: |
          cd tests/ai-generated
          npm ci
          BASE_URL=${{ vars.STAGING_URL }} npx playwright test --project=smoke

  # ──────────────────────────────────
  # Deploy to production (manual approval gate)
  # ──────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [build-push, ai-smoke-test]
    environment:
      name: production           # GitHub Environment with required reviewers
      url: ${{ vars.PROD_URL }}
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH (canary — 10% traffic)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/app
            IMAGE_TAG=${{ needs.build-push.outputs.image_tag }} \
            CANARY_WEIGHT=10 \
            podman compose -f compose.yml -f compose.canary.yml up -d

      - name: Monitor canary (5 minutes)
        run: sleep 300 && ./scripts/check-canary-metrics.sh

      - name: Promote to full traffic
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/app
            IMAGE_TAG=${{ needs.build-push.outputs.image_tag }} \
            podman compose up -d

  # ──────────────────────────────────
  # Post-deploy: changelog generation
  # ──────────────────────────────────
  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: deploy-production
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run changelog-agent
        uses: github/copilot-agent-action@v1
        with:
          agent: changelog-agent
          config: ai/agents/changelog-agent.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
