name: CI — Build · Test · AI Review

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────
  # 1. Lint & Static Analysis
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python lint (ruff)
        run: |
          pip install ruff
          ruff check backend/app --output-format=github

      - name: JS lint (eslint)
        run: |
          cd frontend && npm ci && npx eslint src/

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # 2. Backend Tests
  # ─────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: apptest
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e "backend[test]"

      - name: Run pytest with coverage
        run: |
          cd backend
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-fail-under=80 \
            -v
        env:
          DATABASE_URL: postgresql://postgres:test@localhost/apptest

      - name: Upload coverage
        uses: codecov/codecov-action@v4

  # ─────────────────────────────────────────────
  # 3. Frontend Tests
  # ─────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & test
        run: |
          cd frontend
          npm ci
          npm run test -- --coverage

  # ─────────────────────────────────────────────
  # 4. Container Build Verification
  # ─────────────────────────────────────────────
  container-build:
    name: Container Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install podman
        run: sudo apt-get install -y podman

      - name: Build backend container
        run: podman build -f backend/Containerfile -t app-backend:ci backend/

      - name: Build frontend container
        run: podman build -f frontend/Containerfile -t app-frontend:ci frontend/

      - name: Smoke test — containers start and /health responds
        run: |
          podman network create app-ci
          podman run -d --name backend --network app-ci \
            -e DATABASE_URL=sqlite:///./test.db \
            app-backend:ci
          sleep 5
          podman run --rm --network app-ci curlimages/curl:latest \
            curl -sf http://backend:8000/health

  # ─────────────────────────────────────────────
  # 5. E2E Tests (staging deploy only)
  # ─────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, container-build]
    if: github.base_ref == 'staging' || github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          cd tests/e2e
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests against staging
        run: cd tests/e2e && npx playwright test
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}

  # ─────────────────────────────────────────────
  # 6. AI-Driven Review (adversarial)
  # ─────────────────────────────────────────────
  ai-review:
    name: AI Review
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Copilot coding agent review
        uses: github/copilot-agent-action@v1   # hypothetical — replace with actual action
        with:
          agent: review-agent
          config: ai/agents/review-agent.yml
          prompt-template: ai/prompts/review/adversarial.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
