global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []   # Add alertmanager host if used

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: app-backend
    static_configs:
      - targets: [backend:8000]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]

  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]
